tags:
  - Authentication
summary: Запрос токена сброса пароля
description: |
  Принимает email, генерирует токен сброса пароля (действует 1 час).
  В продакшене токен отправляется на email. В dev-режиме возвращается в ответе.
  Намеренно не раскрывает, зарегистрирован ли email (защита от перебора).
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
responses:
  200:
    description: Запрос принят (независимо от того, существует ли email)
    schema:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Если email зарегистрирован, токен сброса пароля будет отправлен"
        reset_token:
          type: string
          description: "Только в dev-режиме. В продакшене убрать."
          example: "abc123xyz..."
        expires_in_minutes:
          type: integer
          example: 60
  400:
    description: Тело запроса некорректно
