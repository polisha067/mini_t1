tags:
  - Ranking
summary: Итоговый рейтинг команд конкурса
description:
  Возвращает итоговый рейтинг команд конкретного конкурса
parameters:
  - in: path
    name: contest_id
    type: integer
    required: true
    description: ID конкурса
  - in: query
    name: page
    type: integer
    default: 1
    description: Номер страницы
  - in: query
    name: per_page
    type: integer
    default: 10
    description: Количество команд на странице (макс. 100)
  - in: query
    name: sort
    type: string
    enum: [asc, desc]
    default: desc
    description: Направление сортировки (desc — лучшие вверху, asc — худшие вверху)
responses:
  200:
    description: Рейтинг команд конкурса
    schema:
      type: object
      properties:
        contest_id:
          type: integer
          example: 1
        ranking:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
                example: 1
              team_id:
                type: integer
                example: 5
              team_name:
                type: string
                example: "Team Alpha"
              total_score:
                type: number
                format: float
                example: 87.5
              grades_count:
                type: integer
                example: 15
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 10
            total:
              type: integer
              example: 25
            pages:
              type: integer
              example: 3
            has_next:
              type: boolean
              example: true
            has_prev:
              type: boolean
              example: false
  404:
    description: Конкурс не найден
    schema:
      type: object
      properties:
        status:
          type: string
          example: "error"
        error:
          type: object
          properties:
            code:
              type: string
              example: "NOT_FOUND"
            message:
              type: string
              example: "Конкурс с id=999 не найден"
