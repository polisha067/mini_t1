tags:
  - Authentication
summary: Сброс пароля по токену
description: |
  Принимает токен из forgot-password и новый пароль.
  Токен одноразовый — после использования инвалидируется.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          description: Токен из ответа /forgot-password
          example: "abc123xyz..."
        new_password:
          type: string
          description: Новый пароль (мин. 6 символов, буква + цифра)
          example: "NewPass123"
responses:
  200:
    description: Пароль успешно изменён
    schema:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Пароль успешно изменён"
  401:
    description: Токен недействителен или истёк
  422:
    description: Новый пароль не прошёл валидацию
