tags:
  - Contests
summary: Детали конкурса
description: Возвращает полную информацию о конкурсе по ID
security:
  - Bearer: []
parameters:
  - in: path
    name: contest_id
    type: integer
    required: true
    description: ID конкурса
responses:
  200:
    description: Информация о конкурсе
    schema:
      type: object
      properties:
        status:
          type: string
          example: "success"
        contest:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: "Hackathon 2026"
            description:
              type: string
              example: "Хакатон по машинному обучению"
            start_date:
              type: string
              format: date-time
              example: "2026-04-10T09:00:00"
            end_date:
              type: string
              format: date-time
              example: "2026-04-12T18:00:00"
            logo_path:
              type: string
              example: "/uploads/logos/hackathon2026.png"
            organizer_id:
              type: integer
              example: 5
            created_at:
              type: string
              format: date-time
              example: "2026-04-01T12:00:00"
  401:
    description: Требуется аутентификация
    schema:
      type: object
      properties:
        status:
          type: string
          example: "error"
        error:
          type: object
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "Токен не предоставлен"
  404:
    description: Конкурс не найден
    schema:
      type: object
      properties:
        status:
          type: string
          example: "error"
        error:
          type: object
          properties:
            code:
              type: string
              example: "NOT_FOUND"
            message:
              type: string
              example: "Конкурс с id=999 не найден"
