upstream flask_backend {
    server web:5000;  # Имя сервиса из docker-compose
}

server {
    listen 80;
    server_name _;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Раздача загруженных файлов (логотипы)
    location /uploads/ {
        alias /app/uploads/;

        # Разрешаем только изображения
        location ~* \.(png|jpg|jpeg|gif|webp|svg)$ {
            add_header Cache-Control "public, max-age=3600";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Запрещаем выполнение скриптов
        location ~* \.(php|py|jsp|asp|sh|exe)$ {
            deny all;
            return 403;
        }
    }

    # Проксирование API запросов к Flask
    location /api/ {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Для загрузки файлов
        client_max_body_size 16M;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger UI и статика Flask
    location /apidocs/ {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
    }

    location /flasgger_static/ {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        access_log off;
        proxy_pass http://flask_backend/api/status;
    }

    # Всё остальное - 404
    location / {
        return 404;
    }
}