<div class="account-page">
  <div class="account-header">
    <button class="back-btn" type="button" (click)="goHome()">На главную</button>
    <button class="logout-btn" type="button" (click)="logout()">Выйти</button>
  </div>

  <h1>Аккаунт организатора</h1>

  <div class="profile-card" *ngIf="user as u">
    <div class="row">
      <span class="label">Имя:</span>
      <span class="value">{{ u.username }}</span>
    </div>
    <div class="row">
      <span class="label">Email:</span>
      <span class="value">{{ u.email }}</span>
    </div>
    <div class="row">
      <span class="label">Роль:</span>
      <span class="value">Организатор</span>
    </div>
    <div class="row">
      <span class="label">ID:</span>
      <span class="value">{{ u.id }}</span>
    </div>
    <div class="row">
      <span class="label">Дата регистрации:</span>
      <span class="value">{{ u.created_at ? (u.created_at | date: 'dd.MM.yyyy HH:mm') : '—' }}</span>
    </div>
  </div>

  <div class="contests-section">
    <div class="section-header">
      <h2>Мои конкурсы</h2>
      <button class="create-btn" type="button" (click)="goToCreateContest()">
        Создать конкурс
      </button>
    </div>

    <p *ngIf="isLoadingContests" class="section-state">Загрузка...</p>
    <p *ngIf="contestsError" class="section-error">{{ contestsError }}</p>
    <p *ngIf="!isLoadingContests && !contestsError && createdContests.length === 0" class="section-state">
      У вас пока нет созданных конкурсов.
    </p>

    <div class="contest-list" *ngIf="!isLoadingContests && createdContests.length > 0">
      <button
        class="contest-item"
        type="button"
        *ngFor="let contest of createdContests"
        (click)="goToContest(contest.id)"
      >
        <span class="contest-name">{{ contest.name }}</span>
        <span class="contest-date">{{ contest.start_date ? (contest.start_date | date: 'dd.MM.yyyy') : 'Без даты' }}</span>
      </button>
    </div>
  </div>
</div>
