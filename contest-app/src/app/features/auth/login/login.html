<div class="login-container">
  <button class="back-btn" type="button" (click)="goHome()" aria-label="На главную">
    <span class="back-arrow">←</span>
  </button>

  <h1 class="logo">
    <span class="consonant">М</span>
    <span class="vowel">Е</span>
    <span class="consonant">Т</span>
    <span class="consonant">К</span>
    <span class="vowel">А</span>
  </h1>

  <form class="form" (ngSubmit)="onSubmit()">

    <input
      type="email"
      name="email"
      placeholder="введите почту"
      class="input-field"
      [(ngModel)]="credentials.email"
    >

    <div class="password-wrapper">
      <input
        [type]="showPassword ? 'text' : 'password'"
        name="password"
        placeholder="введите пароль"
        class="input-field password-input"
        [(ngModel)]="credentials.password"
      >

      <button
        type="button"
        class="eye-btn"
        (click)="showPassword = !showPassword"
      >
        {{ showPassword ? '🙈' : '👁' }}
      </button>
    </div>

    <button type="submit" class="login-btn" [disabled]="isLoading">
      {{ isLoading ? 'Загрузка...' : 'ВОЙТИ' }}
    </button>

    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

  </form>
</div>
