<div class="register-container">
  <button class="back-btn" type="button" (click)="goHome()" aria-label="На главную">
    <span class="back-arrow">←</span>
  </button>

  <h1 class="logo">
    <span class="consonant">М</span>
    <span class="vowel">Е</span>
    <span class="consonant">Т</span>
    <span class="consonant">К</span>
    <span class="vowel">А</span>
  </h1>

  <form class="form" (ngSubmit)="onSubmit()">
    <input
      type="text"
      name="username"
      placeholder="введите имя"
      class="input-field"
      [(ngModel)]="userData.username"
    >

    <input
      type="email"
      name="email"
      placeholder="введите почту"
      class="input-field"
      [(ngModel)]="userData.email"
    >

    <input
      type="password"
      name="password"
      placeholder="введите пароль"
      class="input-field"
      [(ngModel)]="userData.password"
    >

    <input
      type="password"
      name="confirmPassword"
      placeholder="повторите пароль"
      class="input-field"
      [(ngModel)]="confirmPassword"
    >

    <select
      name="role"
      class="input-field"
      [(ngModel)]="userData.role"
    >
      <option value="expert">Эксперт</option>
      <option value="organizer">Организатор</option>
    </select>

    <button type="submit" class="register-btn" [disabled]="isLoading">
      {{ isLoading ? 'Загрузка...' : 'ЗАРЕГИСТРИРОВАТЬСЯ' }}
    </button>

    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
  </form>
</div>
