<div class="register-container">
  <button class="back-btn" type="button" (click)="goHome()" aria-label="На главную">
    <span class="back-arrow">←</span>
  </button>

  <h1 class="logo">
    <span class="consonant">М</span>
    <span class="vowel">Е</span>
    <span class="consonant">Т</span>
    <span class="consonant">К</span>
    <span class="vowel">А</span>
  </h1>

  <form class="form" (ngSubmit)="onSubmit()">
    <input
      type="text"
      name="username"
      placeholder="введите имя"
      class="input-field"
      [(ngModel)]="userData.username"
    >

    <input
      type="email"
      name="email"
      placeholder="введите почту"
      class="input-field"
      [(ngModel)]="userData.email"
    >

  <div class="password-wrapper">
    <input
      [type]="showPassword ? 'text' : 'password'"
      name="password"
      placeholder="введите пароль"
      class="input-field password-input"
      [(ngModel)]="userData.password"
    >

    <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
      {{ showPassword ? '🙈' : '👁' }}
    </button>
  </div>

  <div class="password-wrapper">
    <input
      [type]="showConfirmPassword ? 'text' : 'password'"
      name="confirmPassword"
      placeholder="повторите пароль"
      class="input-field password-input"
      [(ngModel)]="confirmPassword"
    >

    <button type="button" class="eye-btn" (click)="showConfirmPassword = !showConfirmPassword">
      {{ showConfirmPassword ? '🙈' : '👁' }}
    </button>
  </div>

<div class="custom-select">
  <button
    type="button"
    class="input-field custom-select-trigger"
    (click)="isRoleDropdownOpen = !isRoleDropdownOpen"
  >
    {{ userData.role === 'expert' ? 'Эксперт' : userData.role === 'organizer' ? 'Организатор' : 'Выбрать роль' }}
    <span class="custom-arrow" [class.open]="isRoleDropdownOpen">⌄</span>
  </button>

  <div class="custom-select-menu" *ngIf="isRoleDropdownOpen">
    <button
      type="button"
      class="custom-select-option"
      (click)="selectRole('expert')"
    >
      Эксперт
    </button>

    <button
      type="button"
      class="custom-select-option"
      (click)="selectRole('organizer')"
    >
      Организатор
    </button>
  </div>
</div>

    <button type="submit" class="register-btn" [disabled]="isLoading">
      {{ isLoading ? 'Загрузка...' : 'ЗАРЕГИСТРИРОВАТЬСЯ' }}
    </button>

    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
  </form>
</div>
