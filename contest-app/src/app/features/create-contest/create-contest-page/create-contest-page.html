<div class="create-contest-page">
  <header class="top-bar">
    <button class="back-button" type="button" aria-label="Назад">
      <span class="arrow">←</span>
    </button>

    <button class="account-button" type="button">
      АККАУНТ
    </button>
  </header>

  <main class="create-contest-content">
    <h1 class="page-title">
      СОЗДАЙТЕ КОНКУРС
    </h1>

    <section class="upload-section">
      <div class="image-card">
        <img
          src="https://placehold.co/260x200/png"
          alt="Изображение конкурса"
        />
      </div>

      <div class="upload-text">
        загрузить<br />
        изображение<br />
        конкурса
      </div>
    </section>

    <section class="form-box">
      <div class="form-content">
        <div class="form-row">название конкурса</div>
        <div class="form-row">описание конкурса</div>
        <div class="form-row">дата начала</div>
        <div class="form-row">дата окончания</div>
        <div class="form-row">статус</div>

        <div class="criteria-row">
          <span>критерии</span>
          <button class="add-button" type="button">+</button>
        </div>

        <div class="criterion-item">критерий 1</div>
      </div>
    </section>
  </main>
</div>
