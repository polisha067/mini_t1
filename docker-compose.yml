
services:
  # Фронтенд (Angular)
  frontend:
    build:
      context: ./contest-app
      dockerfile: Dockerfile
    container_name: mini_t1_frontend
    restart: unless-stopped
    volumes:
      - ./contest-app/src:/app/src
      - ./contest-app/public:/app/public
      - ./contest-app/angular.json:/app/angular.json
      - ./contest-app/tsconfig.app.json:/app/tsconfig.app.json
      - ./contest-app/tsconfig.json:/app/tsconfig.json
      - ./contest-app/tsconfig.spec.json:/app/tsconfig.spec.json
      - ./contest-app/package.json:/app/package.json
      - ./contest-app/package-lock.json:/app/package-lock.json
      - ./contest-app/proxy.conf.json:/app/proxy.conf.json
      - ./contest-app/.editorconfig:/app/.editorconfig
      - ./contest-app/.prettierrc:/app/.prettierrc
      - ./uploads:/app/uploads
    ports:
      - "4200:4200"
    networks:
      - mini_t1_network

  # Бэкенд (Flask)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_t1_app
    restart: unless-stopped
    volumes:
      - .:/app              # Hot-reload для разработки
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_APP=app:create_app
      - FLASK_ENV=development
      - FLASK_CONFIG=${FLASK_CONFIG:-development}
      - FLASK_DEBUG=${FLASK_DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - UPLOAD_FOLDER=${UPLOAD_FOLDER:-/app/uploads}
      - UPLOADS_URL=${UPLOADS_URL:-/uploads}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-16777216}
      - MAX_LOGO_SIZE=${MAX_LOGO_SIZE:-5242880}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-png,jpg,jpeg,gif,webp}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mini_t1_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # База данных
  db:
    image: postgres:15-alpine
    container_name: mini_t1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hackathon_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mini_t1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hackathon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: mini_t1_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/app/uploads:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - mini_t1_network

# Сети
networks:
  mini_t1_network:
    driver: bridge
    name: mini_t1_network

# Тома
volumes:
  postgres_data: